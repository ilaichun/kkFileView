name: Build ARM64 kkFileView Image

on:
  push:
    branches:
      - master
   
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build kkFileView with Maven
        run: mvn clean package -Dmaven.test.skip=true

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kkfileview:arm64
          outputs: type=docker,dest=kkfileview-arm64.tar

      - name: Upload ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kkfileview-arm64-image
          path: kkfileview-arm64.tar
